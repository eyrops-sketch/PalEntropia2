<div style="display:flex;flex-wrap:wrap

  • <strong>Flora:</strong> Bosques de helechos arborescentes, licópsidas y las primeras gimnospermas.<br><br>

• <strong>Fauna secundaria:</strong> Comunidad diversa de sinápsidos depredadores y herbívoros, junto con grandes anfibios temnospóndilos.<br><br>

• <strong>Nichos:</strong> Depredador tope. Su característica vela dorsal, formada por espinas neurales alargadas, pudo intervenir en la termorregulación, la exhibición o el almacenamiento energético. Su dentición heterodonta, con grandes colmillos y dientes cortantes, le permitía abatir presas de gran tamaño como <em>Edaphosaurus</em>.<br><br>

• <strong>Relaciones:</strong> Sphenacodontidae. Estaba más emparentado con los mamíferos que con los reptiles actuales y representa el máximo grado de especialización depredadora entre los sinápsidos del Pérmico temprano.

<br><br>

<strong>CLIMA:</strong><br>

Wm16 (Pérmico tropical). Clima cálido con marcada estacionalidad hídrica que condicionaba la actividad de los grandes vertebrados terrestres.

<br><br>

<strong>ESTADO ECOLÓGICO:</strong><br>

Estable. <em>Dimetrodon</em> fue el gran depredador dominante del Pérmico Inferior, combinando una poderosa mordida, dentición especializada y adaptaciones fisiológicas que lo convirtieron en uno de los sinápsidos más exitosos de su tiempo.
